<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Excel Tips Brief Index</title>
<style>
  :root{--bg:#0f1117;--surface:#1a1d27;--border:#2e3350;--accent:#4a86e8;--text:#e2e8f0;--muted:#8892a4}
  body{background:var(--bg);color:var(--text);font-family:-apple-system,sans-serif;margin:0;padding:0}
  .header{background:var(--surface);border-bottom:1px solid var(--border);padding:24px;text-align:center}
  .container{max-width:800px;margin:40px auto;padding:0 20px}
  .latest-card{background:#22263a;border:1px solid var(--border);border-radius:12px;padding:24px;margin-bottom:32px}
  .digest-list{list-style:none;padding:0}
  .digest-item{display:flex;justify-content:space-between;align-items:center;padding:16px 20px;background:var(--surface);border:1px solid var(--border);border-radius:8px;margin-bottom:12px;text-decoration:none;color:inherit;transition:transform .15s}
  .digest-item:hover{transform:translateX(4px);border-color:var(--accent)}
  .digest-date{font-weight:600}
  .digest-meta{color:var(--muted);font-size:.9rem}
</style>
</head>
<body>
<div class="header">
  <h1>📊 Excel Tips Brief</h1>
  <p style="color:var(--muted);margin-top:8px">Weekly digests of techniques, formulas, and videos</p>
</div>
<div class="container">
  <div class="latest-card" id="latest-card">
    <p style="color:var(--muted)">No digests processed yet. Start the workflow to compile your first monthly digest!</p>
  </div>
  <h2>All Digests</h2>
  <ul class="digest-list" id="digest-list">
    <!-- Digest entries will be inserted here -->
  </ul>
</div>
</body>
</html>
